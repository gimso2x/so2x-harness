name: so2x-harness
version: 0.5.0
default_platforms:
  - claude

policies:
  marker_tag: SO2X-HARNESS
  default_overwrite_mode: overwrite

default_rules:
  - language-policy
  - scope-control
  - file-size-limit
  - testing-policy
  - verification-policy

default_skills:
  - planning
  - implementation
  - debugging
  - review
  - specify-lite
  - check-harness
  - spec-validate
  - setup-context
  - changelog
  - safe-commit
  - simplify-cycle
  - squash-commit
